# Ideal Schema for orders table
version: 1

tables:
  orders:
    description: "Clean orders data table"
    
    columns:
      - name: order_id
        type: integer
        nullable: false
        primary_key: true
        description: "Unique order identifier"
        
      - name: customer_id
        type: integer
        nullable: false
        description: "Customer identifier"
        
      - name: order_date
        type: date
        nullable: false
        description: "Date when order was placed"
        default: "1970-01-01"
        
      - name: total_amount
        type: float
        nullable: false
        description: "Total order amount"
        constraints:
          min: 0.0
          max: 100000.0
        default: 0.0
        
      - name: shipping_address
        type: string
        nullable: false
        description: "Shipping address for the order"
        default: "unknown"
        constraints:
          min_length: 5
          max_length: 255
          
      - name: item_count
        type: integer
        nullable: false
        description: "Number of items in the order"
        constraints:
          min: 1
          max: 100
        default: 1

# Data quality rules
quality_rules:
  total_amount:
    empty_handling: "default"
    default_value: 0.0
    type_mismatch_handling: "coerce_or_default"
    out_of_range_handling: "clamp"
  
  order_date:
    empty_handling: "default"
    default_value: "1970-01-01"
    invalid_format_handling: "default"
  
  shipping_address:
    empty_handling: "default"
    default_value: "unknown"
  
  item_count:
    empty_handling: "default"
    default_value: 1
    type_mismatch_handling: "coerce_or_default"
    out_of_range_handling: "clamp"

# Transformation priorities
transformation_order:
  - "null_handling"
  - "type_conversion"
  - "format_validation"
  - "range_validation"
  - "enum_validation"
  - "custom_validation"
